<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduHub - Sci-Fi Learning Platform</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Michroma&family=Audiowide&family=Exo+2:wght@100;200;300;400;500;600;700;800;900&display=swap');
      @import "tailwindcss";

      @theme {
        --font-orbitron: "Orbitron", sans-serif;
        --font-rajdhani: "Rajdhani", sans-serif;
        --font-space: "Space Grotesk", sans-serif;
        --font-michroma: "Michroma", sans-serif;
        --font-audiowide: "Audiowide", sans-serif;
        --font-exo: "Exo 2", sans-serif;
        
        --color-cyber-blue: #00f3ff;
        --color-cyber-pink: #ff00ff;
        --color-cyber-purple: #9d00ff;
        --color-cyber-green: #00ff9f;
      }

      body {
        @apply bg-slate-950 text-slate-200 font-space;
        overflow-x: hidden;
        margin: 0;
      }

      .glass-panel {
        @apply bg-white/5 backdrop-blur-xl border border-white/10 shadow-[0_0_20px_rgba(0,0,0,0.5)];
      }
      
      .cyber-button {
        @apply relative overflow-hidden transition-all duration-300 active:scale-95;
        clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
      }
      
      .neon-text {
        text-shadow: 0 0 10px currentColor;
      }
      
      .neon-border {
        box-shadow: 0 0 15px currentColor;
      }

      .cyber-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background: radial-gradient(circle at 50% 50%, #0a0a1a 0%, #020205 100%);
        overflow: hidden;
      }

      .cyber-grid {
        position: absolute;
        width: 200%;
        height: 200%;
        top: -50%;
        left: -50%;
        background-image: 
          linear-gradient(to right, rgba(0, 243, 255, 0.05) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
        background-size: 50px 50px;
        transform: perspective(500px) rotateX(60deg);
        animation: grid-move 20s linear infinite;
      }

      @keyframes grid-move {
        0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
        100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
      }

      .cyber-scanline {
        position: absolute;
        width: 100%;
        height: 100px;
        background: linear-gradient(to bottom, transparent, rgba(0, 243, 255, 0.1), transparent);
        top: -100px;
        animation: scanline 8s linear infinite;
      }

      @keyframes scanline {
        0% { top: -100px; }
        100% { top: 100%; }
      }

      .cyber-orb {
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(157, 0, 255, 0.1) 0%, transparent 70%);
        filter: blur(50px);
        animation: orb-float 15s ease-in-out infinite alternate;
      }

      @keyframes orb-float {
        0% { transform: translate(-10%, -10%); }
        100% { transform: translate(20%, 20%); }
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(0, 243, 255, 0.2);
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 243, 255, 0.4);
      }

      /* Markdown Table Styling */
      .markdown-body table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 1.5rem;
        font-size: 0.875rem;
      }
      @media (min-width: 640px) {
        .markdown-body table {
          font-size: 1rem;
        }
      }
      .markdown-body th {
        background: rgba(0, 243, 255, 0.2);
        color: #00f3ff;
        font-family: 'Orbitron', sans-serif;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        padding: 0.75rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        text-align: left;
      }
      .markdown-body td {
        padding: 0.75rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        font-family: 'Rajdhani', sans-serif;
        color: rgba(255, 255, 255, 0.8);
      }
      .markdown-body tr:nth-child(even) {
        background: rgba(255, 255, 255, 0.05);
      }
      .markdown-body tr:hover {
        background: rgba(0, 243, 255, 0.05);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/App.tsx"></script>
  </body>
</html>
